<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinguaZyntix — AI Voice Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090f; --s1: #111220; --s2: #191a2e;
      --accent: #7c3aed; --cyan: #06b6d4; --gold: #f59e0b;
      --green: #10b981; --red: #ef4444;
      --text: #f0efff; --text2: #8b89c4; --text3: #3f3d6a;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    .screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow-y: auto; }
    .screen.active { display: flex; }

    /* SETUP */
    #setup {
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(124,58,237,.38) 0%, transparent 65%), var(--bg);
    }
    .setup-box {
      width: 100%; max-width: 400px;
      padding: 40px 22px 56px;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    .logo { width: 80px; height: 80px; border-radius: 50%; padding: 3px;
      background: conic-gradient(from 0deg, var(--accent), var(--cyan), var(--gold), var(--accent));
      animation: spin 7s linear infinite; flex-shrink: 0; }
    .logo-in { width: 100%; height: 100%; border-radius: 50%; background: var(--bg);
      display: flex; align-items: center; justify-content: center; font-size: 32px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .app-name { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .app-sub { font-size: 13px; color: var(--text2); text-align: center; }

    .card { width: 100%; background: var(--s1); border-radius: 14px; padding: 16px; }
    .card-lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; text-align: center; }
    .pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .pill { padding: 8px 16px; border-radius: 999px; border: 1.5px solid var(--text3);
      background: transparent; color: var(--text2); font-size: 13px; font-family: inherit;
      cursor: pointer; transition: all .2s; }
    .pill.on { border-color: var(--accent); background: rgba(124,58,237,.18); color: var(--text); }
    .lvl-row { display: flex; gap: 8px; }
    .lvl { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1.5px solid var(--text3);
      background: transparent; color: var(--text2); font-size: 13px; font-family: inherit;
      cursor: pointer; transition: all .2s; text-align: center; line-height: 1.4; }
    .lvl.on-b { border-color: var(--green); background: rgba(16,185,129,.12); color: var(--green); }
    .lvl.on-i { border-color: var(--gold); background: rgba(245,158,11,.12); color: var(--gold); }

    .name-inp { width: 100%; padding: 13px 16px; border-radius: 12px;
      border: 1.5px solid var(--text3); background: var(--s1);
      color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; }
    .name-inp:focus { border-color: var(--accent); }
    .name-inp::placeholder { color: var(--text3); }

    .start-btn { width: 100%; padding: 15px; border-radius: 13px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      color: #fff; font-size: 16px; font-weight: 600; font-family: 'Syne', sans-serif;
      cursor: pointer; transition: transform .1s; }
    .start-btn:active { transform: scale(.97); }
    .hint { font-size: 11px; color: var(--text3); text-align: center; }

    /* CHAT */
    #chat { display: none; flex-direction: column; overflow: hidden; }
    #chat.active { display: flex; }

    .chat-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--s1); border-bottom: 1px solid rgba(255,255,255,.05); flex-shrink: 0; }
    .back { width: 34px; height: 34px; border-radius: 9px; border: none;
      background: var(--s2); color: var(--text); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .hinfo { flex: 1; }
    .hname { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
    .hsub { font-size: 11px; color: var(--text2); margin-top: 1px; display: flex; gap: 6px; align-items: center; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }
    .badge-b { background: rgba(16,185,129,.15); color: var(--green); }
    .badge-i { background: rgba(245,158,11,.15); color: var(--gold); }
    .spd-wrap { display: flex; gap: 4px; }
    .spd { padding: 4px 9px; border-radius: 999px; font-size: 11px;
      border: 1px solid var(--text3); background: transparent; color: var(--text3);
      cursor: pointer; font-family: inherit; transition: all .15s; }
    .spd.on { border-color: var(--cyan); background: rgba(6,182,212,.12); color: var(--cyan); }

    .msgs { flex: 1; overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: thin; scrollbar-color: var(--s2) transparent; }

    .msg { display: flex; gap: 9px; max-width: 88%; animation: up .3s ease; }
    @keyframes up { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .msg.me { align-self: flex-end; flex-direction: row-reverse; }
    .av { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .av.ai { background: linear-gradient(135deg, var(--accent), var(--cyan)); }
    .av.me { background: var(--s2); }
    .bub { padding: 11px 13px; border-radius: 13px 13px 13px 3px;
      border: 1px solid rgba(255,255,255,.05); background: var(--s1);
      font-size: 14px; line-height: 1.65; }
    .msg.me .bub { background: rgba(124,58,237,.22); border-color: rgba(124,58,237,.3);
      border-radius: 13px 13px 3px 13px; }
    .corr { margin-top: 7px; padding: 7px 10px;
      background: rgba(245,158,11,.07); border-left: 3px solid var(--gold);
      border-radius: 0 7px 7px 0; font-size: 12px; color: var(--text2); line-height: 1.5; }
    .fbtag { display: inline-block; margin-top: 6px; padding: 3px 9px;
      border-radius: 999px; font-size: 11px; font-weight: 500; }
    .fb-good { background: rgba(16,185,129,.15); color: var(--green); }
    .fb-warn { background: rgba(245,158,11,.15); color: var(--gold); }
    .fb-bad  { background: rgba(239,68,68,.15); color: var(--red); }

    .dots { display: flex; gap: 5px; padding: 4px 0; }
    .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: dot 1.2s infinite; }
    .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot { 0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1} }

    .score-bar { display: flex; align-items: center; gap: 9px; padding: 6px 14px; background: var(--s2); flex-shrink: 0; }
    .score-bar.hide { display: none; }
    .strk { flex: 1; height: 5px; background: var(--s1); border-radius: 999px; overflow: hidden; }
    .sfil { height: 100%; border-radius: 999px; transition: width .6s; background: var(--green); }
    .snum { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--green); min-width: 28px; text-align: right; }

    /* MIC AREA */
    .mic-area { flex-shrink: 0; background: var(--s1); border-top: 1px solid rgba(255,255,255,.05);
      padding: 14px 16px 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .status-txt { font-size: 13px; color: var(--text2); text-align: center; min-height: 20px; transition: color .2s; }
    .status-txt.listening { color: var(--red); }
    .status-txt.speaking  { color: var(--cyan); }
    .status-txt.thinking  { color: var(--gold); }

    .mic-wrap { position: relative; width: 80px; height: 80px; }
    .mic-ring { position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid rgba(124,58,237,.4); opacity: 0; }
    .mic-wrap.listening .mic-ring { animation: ring 1s ease-out infinite; }
    .mic-wrap.speaking  .mic-ring { border-color: rgba(6,182,212,.5); animation: ring .7s ease-out infinite; }
    @keyframes ring { 0%{transform:scale(1);opacity:.8}100%{transform:scale(1.6);opacity:0} }
    .mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none;
      background: linear-gradient(145deg, var(--accent), #9333ea);
      color: #fff; font-size: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 28px rgba(124,58,237,.5);
      transition: transform .1s; position: relative; z-index: 1; }
    .mic-btn:active { transform: scale(.91); }
    .mic-btn.listening { background: linear-gradient(145deg, var(--red), #b91c1c); box-shadow: 0 6px 28px rgba(239,68,68,.5); }
    .mic-btn.speaking  { background: linear-gradient(145deg, var(--cyan), #0e7490); box-shadow: 0 6px 28px rgba(6,182,212,.5); }
    .mic-hint-txt { font-size: 11px; color: var(--text3); }

    .txt-row { display: flex; gap: 8px; width: 100%; }
    .txt-in { flex: 1; padding: 10px 14px; border-radius: 999px;
      border: 1.5px solid var(--text3); background: var(--s2);
      color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .2s; }
    .txt-in:focus { border-color: var(--accent); }
    .txt-in::placeholder { color: var(--text3); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--s2); color: var(--text2); font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .send-btn:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="setup-box">
    <div class="logo"><div class="logo-in">🧠</div></div>
    <h1 class="app-name">LinguaZyntix</h1>
    <p class="app-sub">Real-time AI Voice Tutor • Bolo aur seekho</p>

    <div class="card">
      <p class="card-lbl">Language</p>
      <div class="pills">
        <button class="pill on" data-lang="English">🇬🇧 English</button>
        <button class="pill" data-lang="Hindi">🇮🇳 Hindi</button>
        <button class="pill" data-lang="Hinglish">🔀 Hinglish</button>
      </div>
    </div>

    <div class="card">
      <p class="card-lbl">Level</p>
      <div class="lvl-row">
        <button class="lvl on-b" data-level="beginner">🐢 Beginner<br><span style="font-size:11px;opacity:.7">Slow &amp; Simple</span></button>
        <button class="lvl" data-level="intermediate">🚀 Intermediate<br><span style="font-size:11px;opacity:.7">Natural &amp; Fast</span></button>
      </div>
    </div>

    <input class="name-inp" id="name-in" placeholder="Apna naam daalo..." maxlength="20"/>
    <button class="start-btn" id="start-btn">🎙️ Tutor Start Karo</button>
    <p class="hint">⚠️ Chrome browser mein kholna • Mic permission allow karna</p>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <header class="chat-hdr">
    <button class="back" id="back-btn">←</button>
    <div class="hinfo">
      <div class="hname" id="hname">Hi!</div>
      <div class="hsub">
        <span id="hlang" style="color:var(--cyan)">English</span>
        <span id="hlevel" class="badge badge-b">Beginner</span>
      </div>
    </div>
    <div class="spd-wrap">
      <button class="spd on" data-r="0.8">🐢</button>
      <button class="spd" data-r="1.0">🚶</button>
      <button class="spd" data-r="1.2">🚀</button>
    </div>
  </header>

  <div class="msgs" id="msgs"></div>

  <div class="score-bar hide" id="score-bar">
    <span style="font-size:11px;color:var(--text2);white-space:nowrap">Pronunciation</span>
    <div class="strk"><div class="sfil" id="sfil"></div></div>
    <span class="snum" id="snum">0</span>
  </div>

  <div class="mic-area">
    <div class="status-txt" id="status">Neeche button dabao aur baat karo 👇</div>
    <div class="mic-wrap" id="mic-wrap">
      <div class="mic-ring"></div>
      <button class="mic-btn" id="mic-btn">🎙️</button>
    </div>
    <div class="mic-hint-txt" id="mic-hint">Tap karo bolne ke liye</div>
    <div class="txt-row">
      <input class="txt-in" id="txt-in" placeholder="Ya type karo..."/>
      <button class="send-btn" id="send-btn">➤</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 🔑 APNI GROQ KEY YAHAN DAALO
// console.groq.com pe free account banao
// API Keys → Create → Copy paste karo yahan
const GROQ_KEY = "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";
// ═══════════════════════════════════════

const GROQ_API = "https://api.groq.com/openai/v1/chat/completions";
const MODEL    = "llama-3.1-8b-instant";

let userName = "Student";
let lang     = "English";
let level    = "beginner";
let ttsRate  = 0.85;
let history  = [];
let recog    = null;
let isListen = false;
let isSpeak  = false;
let synth    = window.speechSynthesis;

// ── SETUP ──
document.querySelectorAll(".pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach(x => x.classList.remove("on"));
    p.classList.add("on");
    lang = p.dataset.lang;
  });
});

document.querySelectorAll(".lvl").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".lvl").forEach(x => x.classList.remove("on-b","on-i"));
    level = b.dataset.level;
    b.classList.add(level === "beginner" ? "on-b" : "on-i");
    ttsRate = level === "beginner" ? 0.75 : 1.0;
    updateSpd();
  });
});

document.querySelectorAll(".spd").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".spd").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    ttsRate = parseFloat(b.dataset.r);
  });
});
function updateSpd() {
  const map = { 0.75: 0.8, 1.0: 1.0, 1.1: 1.2 };
  document.querySelectorAll(".spd").forEach(b => b.classList.remove("on"));
  const closest = [0.8, 1.0, 1.2].reduce((a, c) => Math.abs(c - ttsRate) < Math.abs(a - ttsRate) ? c : a);
  document.querySelector('.spd[data-r="' + closest + '"]')?.classList.add("on");
}

// ── START ──
document.getElementById("start-btn").addEventListener("click", () => {
  if (GROQ_KEY === "YOUR_GROQ_KEY_HERE") {
    alert("❌ Pehle GROQ_KEY set karo HTML file mein!\nconsole.groq.com pe free key banao.");
    return;
  }
  userName = document.getElementById("name-in").value.trim() || "Student";
  document.getElementById("hname").textContent  = "Hi, " + userName + "!";
  document.getElementById("hlang").textContent  = lang;
  const lb = document.getElementById("hlevel");
  lb.textContent = level === "beginner" ? "Beginner" : "Intermediate";
  lb.className   = "badge " + (level === "beginner" ? "badge-b" : "badge-i");
  history = [];
  showScreen("chat");

  const intro = getIntro();
  addBubble("ai", intro, null, null);
  speak(intro);
});

function getIntro() {
  const map = {
    English:  "Hello " + userName + "! I am your AI English voice tutor. I will listen to you carefully, correct your mistakes gently, and help you speak English confidently. Press the mic button and start talking to me anytime!",
    Hindi:    "Namaste " + userName + "! Main tumhara AI Hindi tutor hoon. Mic dabao aur baat karo — main sunuunga, samjhuunga, aur help karunga!",
    Hinglish: "Hey " + userName + "! Main tumhara AI Hinglish tutor hoon. Mic dabao aur baat shuru karo — main correct karunga aur natural bolna sikhaunga!"
  };
  return map[lang];
}

// ── BACK ──
document.getElementById("back-btn").addEventListener("click", () => {
  stopListen();
  synth.cancel();
  isSpeak = false;
  history = [];
  showScreen("setup");
});

function showScreen(name) {
  document.getElementById("setup").classList.remove("active");
  document.getElementById("chat").classList.remove("active");
  document.getElementById(name).classList.add("active");
}

// ── MIC ──
const micBtn  = document.getElementById("mic-btn");
const micWrap = document.getElementById("mic-wrap");
const statusEl= document.getElementById("status");
const hintEl  = document.getElementById("mic-hint");

micBtn.addEventListener("click", () => {
  if (isSpeak) { synth.cancel(); isSpeak = false; setSpeakUI(false); }
  if (isListen) stopListen();
  else startListen();
});

// ── TEXT ──
const txtIn  = document.getElementById("txt-in");
const sendBtn= document.getElementById("send-btn");
sendBtn.addEventListener("click", sendTxt);
txtIn.addEventListener("keydown", e => { if (e.key === "Enter") sendTxt(); });
function sendTxt() {
  const t = txtIn.value.trim();
  if (!t) return;
  txtIn.value = "";
  handleInput(t, false, 1);
}

// ── RECOGNITION ──
function startListen() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus("❌ Chrome use karo speech ke liye", ""); return; }

  recog = new SR();
  recog.continuous     = false;
  recog.interimResults = true;
  recog.lang = (lang === "Hindi" || lang === "Hinglish") ? "hi-IN" : "en-IN";

  recog.onstart = () => {
    isListen = true;
    micBtn.textContent = "⏹️";
    micBtn.classList.add("listening");
    micWrap.classList.add("listening");
    setStatus("🔴 Sun raha hoon... bolo!", "listening");
    hintEl.textContent = "Dobara tap karo rokne ke liye";
  };

  recog.onresult = e => {
    let interim = "", final = "", conf = 0;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) { final += e.results[i][0].transcript; conf = e.results[i][0].confidence; }
      else interim += e.results[i][0].transcript;
    }
    if (interim) setStatus('"' + interim + '"...', "listening");
    if (final)   handleInput(final, true, conf);
  };

  recog.onerror = e => {
    const m = { "no-speech": "Koi awaaz nahi aayi.", "not-allowed": "Mic permission do.", "network": "Internet check karo." };
    setStatus(m[e.error] || "Error: " + e.error, "");
    stopListenUI();
  };
  recog.onend = () => stopListenUI();

  try { recog.start(); } catch(e) { setStatus("Mic shuru nahi hua.", ""); }
}

function stopListen() {
  if (recog) { try { recog.stop(); } catch(e) {} recog = null; }
  isListen = false;
  stopListenUI();
}
function stopListenUI() {
  isListen = false;
  micBtn.textContent = "🎙️";
  micBtn.classList.remove("listening");
  micWrap.classList.remove("listening");
  if (!isSpeak) { setStatus("Neeche button dabao aur baat karo 👇", ""); hintEl.textContent = "Tap karo bolne ke liye"; }
}
function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className   = "status-txt" + (cls ? " " + cls : "");
}

// ── HANDLE INPUT ──
async function handleInput(text, fromVoice, conf) {
  if (!text) return;
  stopListen();
  addBubble("me", text, null, null);
  if (fromVoice && conf) showScore(conf);

  const tid = addTyping();
  setStatus("🤔 Soch raha hoon...", "thinking");

  history.push({ role: "user", content: text });
  if (history.length > 20) history = history.slice(-20);

  try {
    const res = await fetch(GROQ_API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_KEY
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 400,
        temperature: 0.7,
        messages: [
          { role: "system", content: buildSystem() },
          ...history
        ]
      })
    });

    const data = await res.json();
    removeTyping(tid);

    if (data.error) {
      addBubble("ai", "API Error: " + data.error.message, null, null);
      setStatus("Error aaya.", "");
      return;
    }

    const raw = data.choices[0].message.content;
    history.push({ role: "assistant", content: raw });

    const p = parseResp(raw);
    addBubble("ai", p.message, p.correction, p.fb);
    speak(p.speak || p.message);

  } catch(err) {
    removeTyping(tid);
    addBubble("ai", "Network error! Internet check karo. 🌐", null, null);
    setStatus("Error.", "");
  }
}

// ── SYSTEM PROMPT ──
function buildSystem() {
  const lvlNote = level === "beginner"
    ? "User BEGINNER hai. Bohot simple words use karo, short sentences, slow clear speech. Extra encouragement do. Hinglish mein explain karo agar zarurat ho."
    : "User INTERMEDIATE hai. Natural vocabulary, gentle challenges, conversational flow.";

  const langMap = {
    English:
      "You are a friendly AI English speaking voice tutor for Indian students. " + lvlNote +
      " Respond in spoken conversational style ONLY — no markdown, no bullet points, no asterisks, no formatting. Talk naturally like a friend. Gently correct grammar mistakes inline. Keep response to 2-3 short sentences max. User name: " + userName,
    Hindi:
      "Tum ek friendly AI Hindi voice tutor ho. " + lvlNote +
      " Bilkul spoken style mein jawab do — koi markdown nahi, koi formatting nahi. Natural friendly baat karo. Mistakes pyaar se theek karo. Max 2-3 sentences. User: " + userName,
    Hinglish:
      "You are a friendly AI Hinglish voice tutor. " + lvlNote +
      " Natural Hinglish mein bolo — no markdown, no formatting. Very casual aur warm. Correct mistakes gently. 2-3 sentences max. User: " + userName
  };

  return langMap[lang] +
    "\n\nSIRF JSON format mein jawab do:\n" +
    '{"message":"tumhara spoken response","correction":"grammar fix ya null","fb":"good/warn/bad ya null","speak":"clean text to speak aloud (no emojis)"}';
}

// ── PARSE ──
function parseResp(text) {
  try {
    const m = text.match(/\{[\s\S]*?\}/);
    if (m) {
      const p = JSON.parse(m[0]);
      return { message: p.message || text, correction: p.correction || null, fb: p.fb || null, speak: p.speak || p.message || text };
    }
  } catch(e) {}
  return { message: text, correction: null, fb: null, speak: text };
}

// ── BROWSER TTS ──
function speak(text, onDone) {
  if (!synth || !text) { if (onDone) onDone(); return; }
  synth.cancel();

  const clean = text.replace(/[\u{1F300}-\u{1FAFF}]/gu, "").replace(/[*_`#\[\]]/g, "").trim();
  if (!clean) { if (onDone) onDone(); return; }

  const utter  = new SpeechSynthesisUtterance(clean);
  utter.lang   = (lang === "Hindi" || lang === "Hinglish") ? "hi-IN" : "en-IN";
  utter.rate   = ttsRate;
  utter.pitch  = 1.05;

  // Best available voice
  const voices = synth.getVoices();
  const preferred = voices.find(v =>
    v.lang === "en-IN" ||
    v.name.toLowerCase().includes("india") ||
    (v.name.toLowerCase().includes("google") && v.lang.startsWith("en"))
  );
  if (preferred) utter.voice = preferred;

  utter.onstart = () => {
    isSpeak = true;
    setSpeakUI(true);
  };
  utter.onend = () => {
    isSpeak = false;
    setSpeakUI(false);
    setStatus("Tumhari baari — mic dabao! 🎙️", "");
    hintEl.textContent = "Tap karo bolne ke liye";
    if (onDone) onDone();
  };
  utter.onerror = () => {
    isSpeak = false;
    setSpeakUI(false);
    if (onDone) onDone();
  };

  synth.speak(utter);
}

function setSpeakUI(on) {
  if (on) {
    micBtn.textContent = "🔊";
    micBtn.classList.add("speaking");
    micWrap.classList.add("speaking");
    setStatus("🔊 AI bol raha hai... (tap karo rokne ke liye)", "speaking");
    hintEl.textContent = "AI bol raha hai";
  } else {
    micBtn.textContent = "🎙️";
    micBtn.classList.remove("speaking");
    micWrap.classList.remove("speaking");
  }
}

// ── BUBBLES ──
const msgsEl = document.getElementById("msgs");

function addBubble(who, msg, correction, fb) {
  const d = document.createElement("div");
  d.className = "msg" + (who === "me" ? " me" : "");
  const labels = { good: "✅ Bahut accha!", warn: "⚠️ Thodi galti", bad: "❌ Correction" };
  const fbHtml   = fb   ? '<div class="fbtag fb-' + fb + '">' + (labels[fb]||"") + '</div>' : "";
  const corrHtml = (correction && correction !== "null")
    ? '<div class="corr">✏️ ' + esc(correction) + '</div>' : "";
  d.innerHTML =
    '<div class="av ' + who + '">' + (who === "ai" ? "🤖" : "👤") + '</div>' +
    '<div class="bub">' + esc(msg) + fbHtml + corrHtml + '</div>';
  msgsEl.appendChild(d);
  scroll();
}

let tc = 0;
function addTyping() {
  const id = "ty" + (++tc);
  const d  = document.createElement("div");
  d.className = "msg"; d.id = id;
  d.innerHTML = '<div class="av ai">🤖</div><div class="bub"><div class="dots"><span></span><span></span><span></span></div></div>';
  msgsEl.appendChild(d); scroll(); return id;
}
function removeTyping(id) { const e = document.getElementById(id); if(e) e.remove(); }
function scroll() { setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }, 60); }

// ── SCORE ──
function showScore(conf) {
  const s  = Math.round(conf * 100);
  const sb = document.getElementById("score-bar");
  sb.classList.remove("hide");
  document.getElementById("snum").textContent   = s;
  document.getElementById("sfil").style.width   = s + "%";
  const c = s >= 80 ? "#10b981" : s >= 50 ? "#f59e0b" : "#ef4444";
  document.getElementById("sfil").style.background = c;
  document.getElementById("snum").style.color   = c;
}

// ── UTILS ──
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
</script>
